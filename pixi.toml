[workspace]
channels = [
    "https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/conda-forge/",
    "nvidia",
    "pytorch",
    "conda-forge"
    ]

name = "graduateRAG"
platforms = ["win-64", "linux-64"]
version = "0.1.0"
[pypi-options]
index-url = "https://mirrors.tuna.tsinghua.edu.cn/pypi/web/simple"
extra-index-urls = ["https://mirrors.aliyun.com/pypi/simple/"]

[tasks]

[system-requirements]
cuda = "12.8"

[dependencies]
pytorch = "*"
torchvision = "*"
transformers = "*"
sentence-transformers = "*"
cuda-version = "12.8.*"
jsonnet = ">=0.21.0,<0.22"
rapidfuzz = ">=3.14.1,<4"
requests = ">=2.32.5,<3"
tqdm = ">=4.67.1,<5"
elasticsearch = ">=8.15.0,<9"
dill = ">=0.4.0,<0.5"
base58 = ">=2.1.1,<3"
bs4 = ">=4.14.2,<5"
huggingface_hub = ">=0.36.0,<0.37"
openai = ">=2.7.1,<3"
pandas = ">=2.3.3,<3"
diskcache = ">=5.6.3,<6"
fastapi = ">=0.121.2,<0.122"
